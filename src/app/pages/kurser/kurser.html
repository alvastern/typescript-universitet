<app-header></app-header>

<main>
    <h2>Kurser</h2>

    <section>
        <input type="text" placeholder="Sök kurs..." [(ngModel)]="searchTerm">
        <select [(ngModel)]="selectedSubject">
            <option value="">Alla ämnen</option>
            <option *ngFor="let subject of subjects" [value]="subject">
                {{ subject }}
            </option>
        </select>

        <article>
            <p>Antal träffar: {{ filteredCourses.length }}</p>
        </article>

        <button (click)="sortCourses('courseCode')">Kurskod</button>
        <button (click)="sortCourses('courseName')">Kursnamn</button>
        <button (click)="sortCourses('points')">Poäng</button>
        <button (click)="sortCourses('subject')">Ämne</button>
    </section>

    <div *ngFor="let course of filteredCourses">
        <h3>{{ course.courseName }}</h3>
        <p>{{ course.courseCode }}</p>

        <button (click)="addCourse(course)">Lägg till</button>
    </div>
</main>

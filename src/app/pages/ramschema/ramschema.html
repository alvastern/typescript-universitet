<app-header></app-header>

<main>
    <h2>Totalt: {{ totalPoints }} hp</h2>

    <p *ngIf="message" class="success-message">{{ message }}</p>

    <article *ngFor="let course of courses">
        <h3>{{ course.courseName }}</h3>
        <p>{{ course.courseCode }}</p>
        <p>{{ course.points }} hp</p>

        <button (click)="removeCourse(course)">Ta bort</button>
    </article>
</main>
